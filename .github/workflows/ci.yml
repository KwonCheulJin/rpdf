name: CI

on:
  push:
    branches: [main, devel]
  pull_request:

env:
  PDFIUM_BUILD: "7763"

jobs:
  rust:
    name: Rust (fmt / clippy / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-nextest

      - name: Cache pdfium
        id: cache-pdfium
        uses: actions/cache@v4
        with:
          path: pdfium/
          key: pdfium-${{ env.PDFIUM_BUILD }}-${{ runner.os }}-${{ runner.arch }}

      - name: Fetch pdfium
        if: steps.cache-pdfium.outputs.cache-hit != 'true'
        run: bash scripts/fetch-pdfium.sh

      - name: Set pdfium env
        run: |
          echo "PDFIUM_DYNAMIC_LIB_PATH=$(pwd)/pdfium/lib" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(pwd)/pdfium/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - name: Test (nextest + insta snapshot check)
        run: cargo nextest run --all
        env:
          INSTA_UPDATE: "no"

  node:
    name: Node (install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 패키지가 생기면 lint / test / typecheck 추가
